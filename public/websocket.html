<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket 테스트</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 2em;
        margin-bottom: 10px;
      }

      .status {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.9em;
        font-weight: bold;
        margin-top: 10px;
      }

      .status.connected {
        background: #10b981;
      }

      .status.disconnected {
        background: #ef4444;
      }

      .main-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 30px;
      }

      .panel {
        background: #f9fafb;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #e5e7eb;
      }

      .panel h2 {
        color: #374151;
        margin-bottom: 15px;
        font-size: 1.3em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .panel h2::before {
        content: '🔷';
        font-size: 1.2em;
      }

      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #6b7280;
        font-weight: 500;
      }

      .input-group input,
      .input-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
      }

      .input-group input:focus,
      .input-group select:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        width: 100%;
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-bottom: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button.secondary {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }

      button.danger {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }

      #messages {
        height: 400px;
        overflow-y: auto;
        background: #1f2937;
        color: #f3f4f6;
        padding: 20px;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
        line-height: 1.6;
      }

      .message {
        padding: 8px 12px;
        margin-bottom: 8px;
        border-radius: 6px;
        border-left: 4px solid #667eea;
        background: #374151;
      }

      .message.sent {
        border-left-color: #10b981;
      }

      .message.received {
        border-left-color: #f59e0b;
      }

      .message.system {
        border-left-color: #6366f1;
        background: #4b5563;
      }

      .message-time {
        color: #9ca3af;
        font-size: 0.85em;
        margin-right: 8px;
      }

      .client-info {
        background: #eff6ff;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 2px solid #3b82f6;
      }

      .client-info strong {
        color: #1e40af;
      }

      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }
      }

      /* 플로팅 로그 패널 스타일 */
      .panel.floating {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 450px;
        max-height: 80vh;
        z-index: 1000;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .panel.floating #messages {
        max-height: calc(80vh - 150px);
      }

      .float-toggle-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        font-size: 1.2em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        transition: all 0.3s;
        z-index: 10;
      }

      .float-toggle-btn:hover {
        transform: scale(1.1) rotate(15deg);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .panel.floating .float-toggle-btn {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }

      /* 플로팅 모드일 때 원래 패널 위치에 플레이스홀더 표시 */
      .panel-placeholder {
        display: none;
        background: #f3f4f6;
        border: 2px dashed #d1d5db;
        border-radius: 12px;
        padding: 40px 20px;
        text-align: center;
        color: #9ca3af;
      }

      .panel-placeholder.active {
        display: block;
      }

      @media (max-width: 768px) {
        .panel.floating {
          width: calc(100vw - 40px);
          right: 20px;
          left: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚀 WebSocket 테스트 도구</h1>
        <div class="status disconnected" id="status">연결 끊김</div>
      </div>

      <div class="main-content">
        <!-- 왼쪽 패널: 연결 및 메시지 전송 -->
        <div class="panel">
          <h2>연결 설정</h2>
          <div class="input-group">
            <label>서버 URL</label>
            <input type="text" id="serverUrl" value="http://localhost:3000" />
          </div>
          <button id="connectBtn">연결하기</button>
          <button class="danger" id="disconnectBtn" disabled>연결 해제</button>

          <h2 style="margin-top: 30px">SSE → WebSocket 브릿지</h2>
          <div class="input-group">
            <label>SSE 서버 URL</label>
            <input
              type="text"
              id="sseServerUrl"
              value="http://localhost:4000/events"
              placeholder="SSE 서버 주소"
            />
            <!-- value="https://sse.dev/test" -->
          </div>
          <button class="secondary" id="startSseBtn" disabled>SSE 스트림 시작</button>
          <button class="danger" id="stopSseBtn" disabled>SSE 스트림 중지</button>
          <div id="sseStatus" style="margin-top: 10px; display: none">
            <p style="color: #10b981; font-weight: 600">🔄 SSE 스트림 연결 중...</p>
          </div>

          <div id="clientInfo" class="client-info" style="display: none">
            <strong>클라이언트 ID:</strong> <span id="clientId">-</span>
          </div>

          <h2 style="margin-top: 30px">간단한 메시지 전송</h2>
          <div class="input-group">
            <label>메시지</label>
            <input type="text" id="simpleMessage" placeholder="메시지를 입력하세요" />
          </div>
          <button class="secondary" id="sendSimpleBtn" disabled>메시지 전송</button>

          <h2 style="margin-top: 30px">DB 연결 테스트</h2>
          <button class="secondary" id="dbTestBtn" disabled>DB 연결 확인</button>

          <h2 style="margin-top: 30px">User 목록 조회</h2>
          <div class="input-group">
            <label>name</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요" />
            <label>email</label>
            <input type="text" id="userEmail" placeholder="이메일을 입력하세요" />
          </div>
          <button class="secondary" id="getUsersBtn" disabled>User 목록 가져오기</button>

          <h2 style="margin-top: 30px">오래 걸리는 작업 (Progress)</h2>
          <div class="input-group">
            <label>작업 이름</label>
            <input type="text" id="taskName" value="데이터 처리 작업" />
          </div>
          <div class="input-group">
            <label>단계 수</label>
            <input type="number" id="taskSteps" value="5" min="1" max="10" />
          </div>
          <button class="secondary" id="longTaskBtn" disabled>
            오래 걸리는 작업 시작
          </button>
          <div id="progressBar" style="display: none; margin-top: 10px">
            <div
              style="
                background: #e5e7eb;
                border-radius: 8px;
                height: 20px;
                overflow: hidden;
              "
            >
              <div
                id="progressFill"
                style="
                  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
                  height: 100%;
                  width: 0%;
                  transition: width 0.3s;
                "
              ></div>
            </div>
            <p
              id="progressText"
              style="margin-top: 5px; color: #6b7280; font-size: 0.9em"
            >
              0%
            </p>
          </div>
        </div>

        <!-- 오른쪽 패널: 로그 -->
        <div class="panel" id="logPanel">
          <button class="float-toggle-btn" id="floatToggleBtn" title="플로팅 모드">
            📌
          </button>
          <h2>메시지 로그</h2>
          <div id="messages"></div>
          <button class="danger" style="margin-top: 15px" id="clearBtn">
            로그 지우기
          </button>
        </div>

        <!-- 플로팅 모드일 때 보여줄 플레이스홀더 -->
        <div class="panel-placeholder" id="logPlaceholder">
          <h3>📍 로그 패널이 플로팅 모드입니다</h3>
          <p>화면 우측에 고정된 로그 패널을 확인하세요</p>
          <p style="margin-top: 10px; font-size: 0.9em">
            📌 버튼을 다시 누르면 원래 위치로 돌아옵니다
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
      let socket = null;
      let sseSocket = null;
      let currentRoom = null;

      const statusEl = document.getElementById('status');
      const messagesEl = document.getElementById('messages');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const sendSimpleBtn = document.getElementById('sendSimpleBtn');
      const dbTestBtn = document.getElementById('dbTestBtn');
      const getUsersBtn = document.getElementById('getUsersBtn');
      const longTaskBtn = document.getElementById('longTaskBtn');
      const startSseBtn = document.getElementById('startSseBtn');
      const stopSseBtn = document.getElementById('stopSseBtn');
      const sseStatus = document.getElementById('sseStatus');
      const clearBtn = document.getElementById('clearBtn');
      const clientInfo = document.getElementById('clientInfo');
      const clientIdEl = document.getElementById('clientId');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const floatToggleBtn = document.getElementById('floatToggleBtn');
      const logPanel = document.getElementById('logPanel');
      const logPlaceholder = document.getElementById('logPlaceholder');

      // 플로팅 상태 관리
      let isFloating = false;

      // 플로팅 토글 버튼
      floatToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isFloating = !isFloating;

        if (isFloating) {
          logPanel.classList.add('floating');
          logPlaceholder.classList.add('active');
          floatToggleBtn.textContent = '📍';
          floatToggleBtn.title = '원래 위치로';
          addMessage('📌 로그 패널이 플로팅 모드로 전환되었습니다', 'system');
        } else {
          logPanel.classList.remove('floating');
          logPlaceholder.classList.remove('active');
          floatToggleBtn.textContent = '📌';
          floatToggleBtn.title = '플로팅 모드';
          addMessage('📍 로그 패널이 원래 위치로 돌아왔습니다', 'system');
        }
      });

      function addMessage(message, type = 'system') {
        const time = new Date().toLocaleTimeString('ko-KR');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `<span class="message-time">[${time}]</span>${message}`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function updateStatus(connected) {
        if (connected) {
          statusEl.textContent = '연결됨';
          statusEl.className = 'status connected';
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          sendSimpleBtn.disabled = false;
          dbTestBtn.disabled = false;
          getUsersBtn.disabled = false;
          longTaskBtn.disabled = false;
          startSseBtn.disabled = false;
        } else {
          statusEl.textContent = '연결 끊김';
          statusEl.className = 'status disconnected';
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          sendSimpleBtn.disabled = true;
          dbTestBtn.disabled = true;
          getUsersBtn.disabled = true;
          longTaskBtn.disabled = true;
          startSseBtn.disabled = true;
          stopSseBtn.disabled = true;
          clientInfo.style.display = 'none';
          progressBar.style.display = 'none';
          sseStatus.style.display = 'none';
        }
      }

      connectBtn.addEventListener('click', () => {
        const serverUrl = document.getElementById('serverUrl').value;

        // Connect to /events namespace for basic operations
        socket = io(`${serverUrl}/events`);

        // Connect to /sse namespace for SSE bridge
        sseSocket = io(`${serverUrl}/sse`);

        socket.on('connect', () => {
          addMessage('✅ /events 네임스페이스에 연결되었습니다!', 'system');
          clientIdEl.textContent = socket.id;
          clientInfo.style.display = 'block';
        });

        sseSocket.on('connect', () => {
          addMessage('✅ /sse 네임스페이스에 연결되었습니다!', 'system');
          updateStatus(true);
        });

        socket.on('disconnect', () => {
          addMessage('❌ /events 연결이 끊어졌습니다.', 'system');
        });

        sseSocket.on('disconnect', () => {
          addMessage('❌ /sse 연결이 끊어졌습니다.', 'system');
          updateStatus(false);
        });

        socket.on('message', (data) => {
          addMessage(`📨 메시지 응답: ${data}`, 'received');
        });

        socket.on('dbTest', (data) => {
          if (data.success) {
            addMessage(`✅ DB 연결 성공: ${data.message}`, 'received');
          } else {
            addMessage(`❌ DB 연결 실패: ${data.message}`, 'received');
          }
        });

        socket.on('getUsers', (data) => {
          if (data.success) {
            addMessage(`✅ User 목록 조회 성공: ${data.count}명`, 'received');
            addMessage(`📋 Users: ${JSON.stringify(data.data, null, 2)}`, 'received');
          } else {
            addMessage(`❌ User 목록 조회 실패: ${data.message}`, 'received');
          }
        });

        // 오래 걸리는 작업 진행 상황 수신
        socket.on('taskProgress', (data) => {
          if (data.status === 'started') {
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = '0% - 시작';
            addMessage(`🚀 ${data.message}`, 'system');
          } else if (data.status === 'processing') {
            progressFill.style.width = `${data.progress}%`;
            progressText.textContent = `${Math.round(data.progress)}% - ${data.message}`;
            addMessage(`⏳ ${data.message} - ${JSON.stringify(data.data)}`, 'received');
          } else if (data.status === 'completed') {
            progressFill.style.width = '100%';
            progressText.textContent = '100% - 완료!';
            addMessage(`✅ ${data.message}`, 'system');
            addMessage(`📦 최종 결과: ${JSON.stringify(data.finalResult)}`, 'received');
            setTimeout(() => {
              progressBar.style.display = 'none';
            }, 3000);
          } else if (data.status === 'failed') {
            progressBar.style.display = 'none';
            addMessage(`❌ ${data.message}: ${data.error}`, 'system');
          }
        });

        // SSE 데이터 수신 (sseSocket에서)
        sseSocket.on('sseData', (data) => {
          if (data.status === 'connected') {
            sseStatus.style.display = 'block';
            sseStatus.innerHTML =
              '<p style="color: #10b981; font-weight: 600;">✅ SSE 스트림 연결됨</p>';
            stopSseBtn.disabled = false;
            addMessage(`✅ ${data.message}`, 'system');
          } else if (data.status === 'data') {
            addMessage(`📡 SSE 데이터 수신: ${JSON.stringify(data.data)}`, 'received');
          }
        });

        sseSocket.on('sseComplete', (data) => {
          sseStatus.style.display = 'none';
          stopSseBtn.disabled = true;
          addMessage(`✅ ${data.message}`, 'system');
        });

        sseSocket.on('sseStopped', (data) => {
          sseStatus.style.display = 'none';
          stopSseBtn.disabled = true;
          addMessage(`⏹️ ${data.message}`, 'system');
        });

        sseSocket.on('sseError', (data) => {
          sseStatus.style.display = 'none';
          stopSseBtn.disabled = true;
          addMessage(`❌ ${data.message}: ${data.error}`, 'system');
        });

        socket.on('broadcast', (data) => {
          addMessage(`📢 브로드캐스트: ${data.message}`, 'received');
        });

        socket.on('connect_error', (error) => {
          addMessage(`❌ 연결 오류: ${error.message}`, 'system');
        });
      });

      disconnectBtn.addEventListener('click', () => {
        if (socket) {
          socket.disconnect();
          socket = null;
        }
        if (sseSocket) {
          sseSocket.disconnect();
          sseSocket = null;
        }
      });

      sendSimpleBtn.addEventListener('click', () => {
        const message = document.getElementById('simpleMessage').value;
        if (message && socket) {
          socket.emit('message', message);
          addMessage(`📤 전송: ${message}`, 'sent');
          document.getElementById('simpleMessage').value = '';
        }
      });

      dbTestBtn.addEventListener('click', () => {
        if (socket) {
          socket.emit('dbTest', null, (response) => {
            if (response.success) {
              addMessage(`✅ DB 연결 테스트 성공: ${response.message}`, 'received');
            } else {
              addMessage(`❌ DB 연결 테스트 실패: ${response.message}`, 'received');
            }
          });
          addMessage('🔍 DB 연결 테스트 요청 중...', 'sent');
        }
      });

      getUsersBtn.addEventListener('click', () => {
        if (socket) {
          const name = document.getElementById('userName').value;
          const email = document.getElementById('userEmail').value;
          socket.emit('getUsers', { name, email }, (response) => {
            if (response.success) {
              addMessage(`✅ User 목록 조회 성공: ${response.count}명`, 'received');
              addMessage(
                `📋 Users: ${JSON.stringify(response.data, null, 2)}`,
                'received',
              );
            } else {
              addMessage(`❌ User 목록 조회 실패: ${response.message}`, 'received');
            }
          });
          addMessage('👥 User 목록 조회 요청 중...', 'sent');
        }
      });

      longTaskBtn.addEventListener('click', () => {
        if (socket) {
          const taskName = document.getElementById('taskName').value;
          const steps = parseInt(document.getElementById('taskSteps').value);

          socket.emit('longRunningTask', { taskName, steps }, (response) => {
            if (response.success) {
              addMessage(`✅ 작업 시작: ${response.taskId}`, 'system');
            } else {
              addMessage(`❌ 작업 시작 실패: ${response.message}`, 'system');
            }
          });
          addMessage(`🎯 오래 걸리는 작업 시작: ${taskName} (${steps}단계)`, 'sent');
        }
      });

      startSseBtn.addEventListener('click', () => {
        if (sseSocket) {
          const sseServerUrl = document.getElementById('sseServerUrl').value;

          sseSocket.emit('startSseStream', { serverUrl: sseServerUrl }, (response) => {
            if (response.success) {
              addMessage(`✅ SSE 스트림 시작: ${sseServerUrl}`, 'system');
              startSseBtn.disabled = true;
            } else {
              addMessage(`❌ SSE 스트림 시작 실패: ${response.message}`, 'system');
            }
          });
          addMessage(`📡 SSE 스트림 연결 시도 중...`, 'sent');
        }
      });

      stopSseBtn.addEventListener('click', () => {
        if (sseSocket) {
          sseSocket.emit('stopSseStream', null, (response) => {
            if (response.success) {
              addMessage(`⏹️ SSE 스트림 중지됨`, 'system');
              startSseBtn.disabled = false;
              stopSseBtn.disabled = true;
            } else {
              addMessage(`⚠️ ${response.message}`, 'system');
            }
          });
        }
      });

      clearBtn.addEventListener('click', () => {
        messagesEl.innerHTML = '';
      });

      // Enter 키로 메시지 전송
      document.getElementById('simpleMessage').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendSimpleBtn.disabled) {
          sendSimpleBtn.click();
        }
      });

      addMessage('👋 WebSocket 테스트 도구에 오신 것을 환영합니다!', 'system');
      addMessage('📡 "연결하기" 버튼을 눌러 서버에 연결하세요.', 'system');
    </script>
  </body>
</html>
